<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Re:Arise 売上シミュレーション</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e12;--surface:#16161c;--surface2:#1e1e26;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8e6f0;--muted:#7a788a;
  --accent-m:#c9a0dc;--accent-a:#f0a0b8;--accent-both:#a0c8f0;
  --green:#7de3b0;--red:#f07a7a;--amber:#f0c070;
  --mono:'DM Mono',monospace;--sans:'Zen Kaku Gothic New',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:40px 20px 80px;}
.container{max-width:980px;margin:0 auto;}

/* header */
.header{text-align:center;margin-bottom:40px;}
.header .unit{font-family:var(--mono);font-size:11px;letter-spacing:0.3em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.header h1{font-size:clamp(20px,5vw,32px);font-weight:300;letter-spacing:0.05em;line-height:1.3;}
.header h1 span{font-weight:700;background:linear-gradient(90deg,var(--accent-m),var(--accent-a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* toolbar */
.toolbar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:16px;flex-wrap:wrap;}
.tool-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.tool-btn:hover{border-color:var(--accent-m);color:var(--accent-m);}
.tool-btn.primary{border-color:var(--accent-m);color:var(--accent-m);}
.tool-btn.danger{border-color:var(--border2);color:var(--muted);}
.tool-btn.danger:hover{border-color:var(--red);color:var(--red);}

/* settings row */
.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.setting-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:18px 22px;}
.setting-label{font-size:10px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.fan-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fan-presets{display:flex;gap:6px;}
.preset-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all 0.15s;}
.preset-btn:hover{border-color:var(--accent-m);color:var(--text);}
.preset-btn.active{background:var(--surface2);border-color:var(--accent-m);color:var(--accent-m);}
.fan-custom{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.fan-input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:14px;padding:6px 10px;width:80px;outline:none;transition:border-color 0.15s;}
.fan-input:focus{border-color:var(--accent-m);}
.cost-row{display:flex;align-items:center;gap:10px;}
.cost-prefix{font-size:13px;color:var(--muted);}
.cost-input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:14px;padding:6px 10px;width:130px;outline:none;transition:border-color 0.15s;}
.cost-input:focus{border-color:var(--accent-m);}
.fee-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--muted);}
.fee-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;}
.fee-toggle input[type=checkbox]{accent-color:var(--accent-m);width:14px;height:14px;}

/* summary */
.summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px;}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px 18px;}
.summary-card.hl{background:var(--surface2);border-color:var(--border2);}
.s-label{font-size:10px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:7px;}
.s-val{font-family:var(--mono);font-size:clamp(14px,2.5vw,20px);font-weight:500;line-height:1;}
.s-val.green{color:var(--green);}.s-val.red{color:var(--red);}.s-val.amber{color:var(--amber);}
.s-sub{font-size:11px;color:var(--muted);margin-top:5px;}

/* chart */
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:16px;}
.chart-title{font-size:11px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-bottom:16px;}
.chart-wrap{display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
canvas#pieChart{max-width:180px;max-height:180px;}
.chart-legend{display:flex;flex-direction:column;gap:8px;flex:1;min-width:160px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-name{flex:1;color:var(--text);}
.legend-val{font-family:var(--mono);font-size:11px;color:var(--muted);}

/* sections */
.section{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;}
.section-header{padding:11px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.cat-input{background:transparent;border:none;border-bottom:1px dashed var(--border2);color:var(--text);font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:0.12em;outline:none;padding:2px 4px;width:180px;}
.cat-input:focus{border-bottom-color:var(--accent-m);}
.sec-total{font-family:var(--mono);font-size:12px;color:var(--text);margin-left:auto;}
.sec-net{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:8px;}
.del-sec-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-size:11px;padding:3px 9px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.del-sec-btn:hover{border-color:var(--red);color:var(--red);}

table{width:100%;border-collapse:collapse;}
thead th{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
th.r,td.r{text-align:right;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,0.02);}
td{padding:9px 10px;font-size:12px;vertical-align:middle;}

.cell-input{background:transparent;border:none;border-bottom:1px dashed transparent;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;padding:2px;width:100%;transition:border-color 0.15s;}
.cell-input:focus{border-bottom-color:var(--accent-m);}
.cell-input:hover{border-bottom-color:var(--border2);}
.num-input{background:transparent;border:none;border-bottom:1px dashed transparent;color:var(--muted);font-family:var(--mono);font-size:11px;outline:none;padding:2px;text-align:right;width:55px;transition:border-color 0.15s;}
.num-input:focus{border-bottom-color:var(--accent-m);color:var(--text);}
.num-input:hover{border-bottom-color:var(--border2);}
.cost-cell{background:transparent;border:none;border-bottom:1px dashed transparent;color:var(--muted);font-family:var(--mono);font-size:11px;outline:none;padding:2px;text-align:right;width:55px;transition:border-color 0.15s;}
.cost-cell:focus{border-bottom-color:var(--amber);color:var(--amber);}
.cost-cell:hover{border-bottom-color:var(--border2);}

.td-annual{font-family:var(--mono);font-size:12px;font-weight:500;white-space:nowrap;}
.td-net{font-family:var(--mono);font-size:11px;white-space:nowrap;}
.td-monthly{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;}

.who-btn{width:18px;height:18px;border-radius:50%;border:none;cursor:pointer;font-size:8px;font-weight:700;transition:opacity 0.15s;flex-shrink:0;}
.who-btn:hover{opacity:0.75;}
.who-m{background:var(--accent-m);color:#1a0a24;}
.who-a{background:var(--accent-a);color:#2a0a14;}
.who-b{background:var(--accent-both);color:#0a1824;}

.del-btn{background:transparent;border:none;color:var(--border2);font-size:15px;cursor:pointer;padding:0 3px;line-height:1;transition:color 0.15s;}
.del-btn:hover{color:var(--red);}

.add-row-btn{display:flex;align-items:center;gap:6px;width:100%;padding:9px 14px;background:transparent;border:none;border-top:1px dashed var(--border);color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all 0.15s;text-align:left;}
.add-row-btn:hover{color:var(--accent-m);background:rgba(201,160,220,0.04);}

.add-cat-btn{display:flex;align-items:center;gap:8px;width:100%;padding:13px 18px;background:var(--surface);border:1px dashed var(--border2);border-radius:13px;color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all 0.15s;margin-bottom:20px;}
.add-cat-btn:hover{color:var(--accent-m);border-color:var(--accent-m);}

.footer-note{text-align:center;font-size:11px;color:var(--muted);margin-top:28px;line-height:1.9;}
.monthly-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.month-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.month-label{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.15em;margin-bottom:8px;}
.month-total{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px;}
.month-items{display:flex;flex-direction:column;gap:3px;}
.month-item{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;gap:6px;}
.month-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.month-item-val{font-family:var(--mono);font-size:11px;white-space:nowrap;}
.month-card.debut{border-color:var(--accent-m);}
.month-card.birth-m{border-color:var(--accent-m);border-style:dashed;}
.month-card.birth-a{border-color:var(--accent-a);border-style:dashed;}

/* toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}

@media(max-width:660px){
  .summary-grid{grid-template-columns:1fr 1fr;}
  .settings-row{grid-template-columns:1fr;}
  thead th:nth-child(4),td:nth-child(4),
  thead th:nth-child(5),td:nth-child(5){display:none;}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="unit">Revenue Simulation</div>
    <h1><span>Re:Arise</span> 売上シミュレーション</h1>
  </div>

  <div class="toolbar">
    <button class="tool-btn" onclick="exportJSON()">📥 データを保存</button>
    <label class="tool-btn" style="cursor:pointer;">📤 データを読み込む<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
    <button class="tool-btn danger" onclick="resetData()">↺ リセット</button>
  </div>

  <div class="settings-row">
    <div class="setting-card">
      <div class="setting-label">ファン数を設定</div>
      <div class="fan-controls">
        <div class="fan-presets">
          <button class="preset-btn" onclick="setFans(50,this)">50人</button>
          <button class="preset-btn active" onclick="setFans(100,this)">100人</button>
          <button class="preset-btn" onclick="setFans(200,this)">200人</button>
        </div>
        <div class="fan-custom">
          <span>カスタム：</span>
          <input type="number" class="fan-input" id="fanInput" value="100" min="1" oninput="setFansCustom(this.value)">
          <span>人</span>
        </div>
      </div>
    </div>
    <div class="setting-card">
      <div class="setting-label">回収目標・手数料</div>
      <div class="cost-row">
        <span class="cost-prefix">回収目標：¥</span>
        <input type="number" class="cost-input" id="costInput" value="1040000" min="0" oninput="COST=+this.value||0;renderSummary()">
      </div>
      <div class="fee-row">
        <label class="fee-toggle">
          <input type="checkbox" id="feeToggle" onchange="renderSummary()">
          <span>BOOTH手数料（5.6%）を差し引く</span>
        </label>
      </div>
      <div class="fee-row">
        <label class="fee-toggle">
          <input type="checkbox" id="costToggle" onchange="render()">
          <span>原価列を表示する</span>
        </label>
      </div>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="s-label">年間売上（見込み）</div>
      <div class="s-val" id="s-annual">—</div>
      <div class="s-sub" id="s-monthly">月平均 —</div>
    </div>
    <div class="summary-card">
      <div class="s-label">手取り年間売上</div>
      <div class="s-val" id="s-net">—</div>
      <div class="s-sub" id="s-net-sub">手数料・原価控除後</div>
    </div>
    <div class="summary-card">
      <div class="s-label">回収目標</div>
      <div class="s-val" id="s-cost">—</div>
      <div class="s-sub">初期費用合計</div>
    </div>
    <div class="summary-card hl">
      <div class="s-label">回収期間（目安）</div>
      <div class="s-val" id="s-months">—</div>
      <div class="s-sub" id="s-status">—</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="chart-title" onclick="toggleChart()" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;">
      <span>カテゴリ別売上比率</span>
      <span id="chartArrow" style="font-size:11px;color:var(--muted);transition:transform 0.25s;display:inline-block;">▼</span>
    </div>
    <div id="chartBody" style="display:none;margin-top:16px;">
      <div class="chart-wrap">
        <canvas id="pieChart" width="180" height="180"></canvas>
        <div class="chart-legend" id="chartLegend"></div>
      </div>
    </div>
  </div>

  <div class="chart-section" style="margin-bottom:16px;">
    <div class="chart-title" onclick="toggleMonthly()" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;">
      <span>月次売上カレンダー（9月デビュー想定）</span>
      <span id="monthlyArrow" style="font-size:11px;color:var(--muted);transition:transform 0.25s;display:inline-block;">▼</span>
    </div>
    <div id="monthlyBody" style="display:none;margin-top:16px;">
      <div id="monthlyGrid"></div>
    </div>
  </div>

  <div id="sections"></div>

  <button class="add-cat-btn" onclick="addCat()">
    ＋ カテゴリを追加
  </button>

  <div class="footer-note">
    すべての項目は直接クリックして編集できます。<br>
    色丸はキャラ担当：<span style="color:var(--accent-m)">●める</span>　<span style="color:var(--accent-a)">●あも</span>　<span style="color:var(--accent-both)">●2人</span>（クリックで切替）　原価列は上の設定から表示できます。
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script>
var COST = 1040000;
var fans = 100;
var pieChart = null;

var DEFAULT_DATA = [
  { cat: "デビュー記念グッズ", items: [
    { name: "アクリルスタンド・める", freq: 1, price: 2000, cost: 800, rate: 50, who: "m" },
    { name: "アクリルスタンド・あも", freq: 1, price: 2000, cost: 800, rate: 50, who: "a" },
    { name: "缶バッジ・める（2個セット）", freq: 1, price: 1000, cost: 300, rate: 55, who: "m" },
    { name: "缶バッジ・あも（2個セット）", freq: 1, price: 1000, cost: 300, rate: 55, who: "a" },
    { name: "アクリルパネル", freq: 1, price: 3500, cost: 1200, rate: 40, who: "b" },
    { name: "チェキ風カード（ランダム5種・平均2枚）", freq: 1, price: 1000, cost: 200, rate: 55, who: "b" },
  ]},
  { cat: "める生誕グッズ（年1回）", items: [
    { name: "アクリルスタンド・める", freq: 1, price: 2000, cost: 800, rate: 40, who: "m" },
    { name: "缶バッジ・める（2個セット）", freq: 1, price: 1000, cost: 300, rate: 45, who: "m" },
    { name: "アクリルパネル", freq: 1, price: 3500, cost: 1200, rate: 30, who: "m" },
    { name: "チェキ風カード（平均2枚）", freq: 1, price: 1000, cost: 200, rate: 40, who: "m" },
  ]},
  { cat: "あも生誕グッズ（年1回）", items: [
    { name: "アクリルスタンド・あも", freq: 1, price: 2000, cost: 800, rate: 40, who: "a" },
    { name: "缶バッジ・あも（2個セット）", freq: 1, price: 1000, cost: 300, rate: 45, who: "a" },
    { name: "アクリルパネル", freq: 1, price: 3500, cost: 1200, rate: 30, who: "a" },
    { name: "チェキ風カード（平均2枚）", freq: 1, price: 1000, cost: 200, rate: 40, who: "a" },
  ]},
  { cat: "季節フォト（年4回）", items: [
    { name: "めるフォト（10種ランダム・平均2枚）", freq: 4, price: 1000, cost: 0, rate: 45, who: "m" },
    { name: "あもフォト（10種ランダム・平均2枚）", freq: 4, price: 1000, cost: 0, rate: 45, who: "a" },
  ]},
  { cat: "マンスリーボイス（毎月）", items: [
    { name: "マンスリーボイス・める", freq: 12, price: 1000, cost: 0, rate: 50, who: "m" },
    { name: "マンスリーボイス・あも", freq: 12, price: 1000, cost: 0, rate: 50, who: "a" },
  ]},
  { cat: "音声・お話し会", items: [
    { name: "2人収録ボイス（年4回）", freq: 4, price: 1000, cost: 0, rate: 55, who: "b" },
    { name: "オンラインお話し会 3分（隔月）", freq: 6, price: 2000, cost: 0, rate: 25, who: "b" },
  ]},
];

var data = JSON.parse(JSON.stringify(DEFAULT_DATA));

var CHART_COLORS = ['#c9a0dc','#f0a0b8','#a0c8f0','#7de3b0','#f0c070','#f07a7a','#85b7eb','#ed93b1','#5dcaa5'];

function fmt(n){ return '¥' + Math.round(n).toLocaleString(); }
function whoClass(w){ return w==='m'?'who-m':w==='a'?'who-a':'who-b'; }
function whoNext(w){ return w==='m'?'a':w==='a'?'b':'m'; }
function whoLabel(w){ return w==='m'?'め':w==='a'?'あ':'両'; }
function getFee(){ return document.getElementById('feeToggle').checked ? 0.056 : 0; }
function showCost(){ return document.getElementById('costToggle').checked; }

function calcItem(item){
  var buyers = Math.round(fans * item.rate / 100);
  var annual = item.price * buyers * item.freq;
  var fee = annual * getFee();
  var costTotal = (item.cost||0) * buyers * item.freq;
  var net = annual - fee - costTotal;
  return { buyers: buyers, annual: annual, net: net, monthly: annual/12, netMonthly: net/12 };
}

function render(){
  var showC = showCost();
  var html = '';
  data.forEach(function(sec, si){
    var secAnnual = 0; var secNet = 0;
    sec.items.forEach(function(item){ var c=calcItem(item); secAnnual+=c.annual; secNet+=c.net; });

    html += '<div class="section">';
    html += '<div class="section-header">';
    html += '<input class="cat-input" value="'+esc(sec.cat)+'" oninput="data['+si+'].cat=this.value" placeholder="カテゴリ名">';
    html += '<span class="sec-total" id="sec-total-'+si+'">'+fmt(secAnnual)+' / 年</span>';
    html += '<span class="sec-net" id="sec-net-'+si+'">(手取 '+fmt(secNet)+')</span>';
    html += '<button class="del-sec-btn" onclick="delCat('+si+')">削除</button>';
    html += '</div>';

    html += '<table><thead><tr>';
    html += '<th style="width:26px"></th>';
    html += '<th>コンテンツ名</th>';
    html += '<th class="r" style="width:60px">頻度/年</th>';
    html += '<th class="r" style="width:75px">単価</th>';
    if(showC) html += '<th class="r" style="width:65px">原価</th>';
    html += '<th class="r" style="width:60px">購入率</th>';
    html += '<th class="r" style="width:60px">購入者</th>';
    html += '<th class="r" style="width:90px">年間売上</th>';
    if(showC) html += '<th class="r" style="width:85px">手取/年</th>';
    html += '<th class="r" style="width:80px">月換算</th>';
    html += '<th style="width:22px"></th>';
    html += '</tr></thead><tbody>';

    sec.items.forEach(function(item, ii){
      var c = calcItem(item);
      html += '<tr>';
      html += '<td><button class="who-btn '+whoClass(item.who)+'" onclick="toggleWho('+si+','+ii+')" title="担当切替">'+whoLabel(item.who)+'</button></td>';
      html += '<td><input class="cell-input" value="'+esc(item.name)+'" oninput="data['+si+'].items['+ii+'].name=this.value" placeholder="コンテンツ名"></td>';
      html += '<td class="r"><input class="num-input" type="number" value="'+item.freq+'" min="1" oninput="data['+si+'].items['+ii+'].freq=+this.value||1;render()"></td>';
      html += '<td class="r"><input class="num-input" type="number" value="'+item.price+'" min="0" oninput="data['+si+'].items['+ii+'].price=+this.value||0;render()"></td>';
      if(showC) html += '<td class="r"><input class="cost-cell" type="number" value="'+(item.cost||0)+'" min="0" oninput="data['+si+'].items['+ii+'].cost=+this.value||0;render()" title="原価（1個あたり）"></td>';
      html += '<td class="r"><input class="num-input" type="number" value="'+item.rate+'" min="0" max="100" oninput="data['+si+'].items['+ii+'].rate=Math.min(100,+this.value||0);render()">%</td>';
      html += '<td class="r" style="font-family:var(--mono);font-size:11px;color:var(--muted)">'+c.buyers+'人</td>';
      html += '<td class="r td-annual">'+fmt(c.annual)+'</td>';
      if(showC) html += '<td class="r td-net" style="color:var(--green)">'+fmt(c.net)+'</td>';
      html += '<td class="r td-monthly">'+fmt(c.monthly)+'</td>';
      html += '<td><button class="del-btn" onclick="delRow('+si+','+ii+')" title="削除">×</button></td>';
      html += '</tr>';
    });

    html += '</tbody></table>';
    html += '<button class="add-row-btn" onclick="addRow('+si+')">＋ 項目を追加</button>';
    html += '</div>';
  });

  document.getElementById('sections').innerHTML = html;
  renderSummary();
  renderChart();
}

function renderSummary(){
  var totalAnnual = 0; var totalNet = 0;
  data.forEach(function(sec, si){
    var sa=0; var sn=0;
    sec.items.forEach(function(item){ var c=calcItem(item); sa+=c.annual; sn+=c.net; });
    totalAnnual+=sa; totalNet+=sn;
    var ea=document.getElementById('sec-total-'+si);
    var en=document.getElementById('sec-net-'+si);
    if(ea) ea.textContent=fmt(sa)+' / 年';
    if(en) en.textContent='(手取 '+fmt(sn)+')';
  });
  var monthly = totalAnnual/12;
  var netMonthly = totalNet/12;
  var months = netMonthly > 0 ? Math.ceil(COST/netMonthly) : 999;
  document.getElementById('s-annual').textContent = fmt(totalAnnual);
  document.getElementById('s-monthly').textContent = '月平均 '+fmt(monthly);
  document.getElementById('s-net').textContent = fmt(totalNet);
  document.getElementById('s-net-sub').textContent = getFee()>0 ? '手数料5.6%・原価控除後' : '原価控除後';
  document.getElementById('s-cost').textContent = fmt(COST);
  document.getElementById('s-months').textContent = '約'+months+'ヶ月';
  var em = document.getElementById('s-months');
  em.className = 's-val '+(months<=12?'green':months<=24?'amber':'red');
  document.getElementById('s-status').textContent = months<=12?'1年以内に回収可能！':months<=24?'約2年で回収見込み':'計画の見直しを検討';
}

function toggleMonthly(){
  monthlyOpen = !monthlyOpen;
  var body = document.getElementById('monthlyBody');
  var arrow = document.getElementById('monthlyArrow');
  body.style.display = monthlyOpen ? 'block' : 'none';
  arrow.style.transform = monthlyOpen ? 'rotate(180deg)' : 'rotate(0deg)';
  if(monthlyOpen) renderMonthly();
}

function renderMonthly(){
  if(!monthlyOpen) return;
  var html = '<div class="monthly-grid">';
  MONTHLY_PLAN.forEach(function(m){
    var monthTotal = 0;
    var itemRows = '';
    m.items.forEach(function(row){
      var name=row[0]; var price=row[1]; var rate=row[2];
      var buyers = Math.round(fans * rate / 100);
      var val = price * buyers;
      monthTotal += val;
      itemRows += '<div class="month-item"><span class="month-item-name">'+name+'</span><span class="month-item-val">'+fmt(val)+'</span></div>';
    });
    var cls = 'month-card' + (m.debut?' debut':'') + (m.birthM?' birth-m':'') + (m.birthA?' birth-a':'');
    html += '<div class="'+cls+'">';
    html += '<div class="month-label">'+m.month+'</div>';
    html += '<div class="month-total">'+fmt(monthTotal)+'</div>';
    html += '<div class="month-items">'+itemRows+'</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('monthlyGrid').innerHTML = html;
}

var chartOpen = false;

function toggleChart(){
  chartOpen = !chartOpen;
  var body = document.getElementById('chartBody');
  var arrow = document.getElementById('chartArrow');
  body.style.display = chartOpen ? 'block' : 'none';
  arrow.style.transform = chartOpen ? 'rotate(180deg)' : 'rotate(0deg)';
  if(chartOpen) renderChart();
}

function renderChart(){
  if(!chartOpen) return;
  var labels=[]; var vals=[]; var colors=[];
  data.forEach(function(sec,i){
    var total=0;
    sec.items.forEach(function(item){ total+=calcItem(item).annual; });
    if(total>0){ labels.push(sec.cat); vals.push(total); colors.push(CHART_COLORS[i%CHART_COLORS.length]); }
  });
  var totalAll = vals.reduce(function(a,b){return a+b;},0);
  var canvas = document.getElementById('pieChart');
  if(pieChart){ pieChart.destroy(); pieChart=null; }
  if(vals.length===0) return;
  pieChart = new Chart(canvas, {
    type:'doughnut',
    data:{ labels:labels, datasets:[{ data:vals, backgroundColor:colors, borderWidth:0, hoverOffset:4 }] },
    options:{ cutout:'60%', plugins:{ legend:{display:false}, tooltip:{callbacks:{label:function(ctx){
      return ' '+fmt(ctx.parsed)+' ('+Math.round(ctx.parsed/totalAll*100)+'%)';
    }}}}, animation:{duration:300} }
  });
  var legend = '';
  labels.forEach(function(l,i){
    legend += '<div class="legend-item"><div class="legend-dot" style="background:'+colors[i]+'"></div><span class="legend-name">'+l+'</span><span class="legend-val">'+Math.round(vals[i]/totalAll*100)+'%</span></div>';
  });
  document.getElementById('chartLegend').innerHTML = legend;
}

function toggleWho(si,ii){ data[si].items[ii].who=whoNext(data[si].items[ii].who); render(); }

function delRow(si,ii){ data[si].items.splice(ii,1); render(); }
function addCat(){ data.push({cat:"新しいカテゴリ",items:[{name:"新しい項目",freq:1,price:1000,cost:0,rate:30,who:"b"}]}); render(); }
function delCat(si){
  if(data.length<=1){showToast('最低1つのカテゴリが必要です');return;}
  if(confirm('「'+data[si].cat+'」を削除しますか？')){ data.splice(si,1); render(); }
}

function setFans(n,btn){
  fans=n;
  document.getElementById('fanInput').value=n;
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  render();
}
function setFansCustom(v){
  var n=parseInt(v); if(isNaN(n)||n<1) return;
  fans=n;
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
  render();
}

function exportJSON(){
  var payload = { fans:fans, cost:COST, data:data };
  var blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rearaise_simulation.json';
  a.click();
  showToast('データを保存しました');
}
function importJSON(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try{
      var p = JSON.parse(ev.target.result);
      if(p.data) data = p.data;
      if(p.fans){ fans=p.fans; document.getElementById('fanInput').value=fans; }
      if(p.cost){ COST=p.cost; document.getElementById('costInput').value=COST; }
      render();
      showToast('データを読み込みました');
    }catch(err){ showToast('読み込みエラー：ファイルが正しくありません'); }
  };
  reader.readAsText(file);
  e.target.value='';
}
function resetData(){
  if(confirm('すべての入力をリセットしますか？')){
    data=JSON.parse(JSON.stringify(DEFAULT_DATA));
    fans=100; COST=1040000;
    document.getElementById('fanInput').value=100;
    document.getElementById('costInput').value=1040000;
    document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelector('.preset-btn:nth-child(2)').classList.add('active');
    render();
    showToast('リセットしました');
  }
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
